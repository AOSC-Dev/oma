name: Rust

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Install stable toolchain with rustfmt available
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt

      - name: Check format
        run: cargo fmt --check
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
          override: true
      - name: Install Dependency
        run: sudo apt-get -y update && sudo apt-get -y install libapt-pkg-dev nettle-dev libssl-dev libclang-dev clang llvm
      - uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check clippy
        run: cargo clippy -- -D warnings
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install Dependency
        run: sudo apt-get -y update && sudo apt-get -y install libapt-pkg-dev nettle-dev libssl-dev libclang-dev clang llvm
      - name: Build
        run: cargo build
      - name: Build without aosc feature
        run: cargo build --no-default-features --features nice-setup
      - name: Test
        run: cargo test --workspace
      - name: Generate manpages
        run: |
          mkdir -p ./data/man/zh_CN ./data/man/zh_TW ./data/man/en_US

          LANG=C ./target/debug/oma generate-manpages --path ./data
          LANG=zh_CN.UTF-8 ./target/debug/oma generate-manpages --path ./data
          LANG=zh_TW.UTF-8 ./target/debug/oma generate-manpages --path ./data
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update manpages [skip ci]"
          file_pattern: "data/man/**/*" # 指定 manpages 存放的路径模式
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
